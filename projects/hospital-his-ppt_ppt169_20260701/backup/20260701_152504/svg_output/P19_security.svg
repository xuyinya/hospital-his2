<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="80" y="44" width="6" height="36" rx="3" fill="#2563EB"/>
  <text x="100" y="72" font-family="Microsoft YaHei, Arial, sans-serif" font-size="42" font-weight="bold" fill="#1E293B">安全设计要点</text>
  <line x1="100" y1="92" x2="320" y2="92" stroke="#06B6D4" stroke-width="2"/>
  <!-- 三列安全要点 -->
  <g transform="translate(80,140)">
    <rect x="0" y="0" width="350" height="250" rx="8" fill="#F0F4FF"/><text x="20" y="40" font-family="Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="bold" fill="#2563EB">认证安全</text><text x="20" y="80" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#1E293B">密码 BCrypt 加密</text><text x="20" y="115" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#1E293B">JWT 令牌验证</text><text x="20" y="150" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#1E293B">24小时过期</text><text x="20" y="185" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#1E293B">拦截器放行 /auth/login</text><text x="20" y="220" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#1E293B">401 自动跳转登录</text>
    <rect x="380" y="0" width="350" height="250" rx="8" fill="#F0F4FF"/><text x="400" y="40" font-family="Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="bold" fill="#06B6D4">数据安全</text><text x="400" y="80" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#1E293B">费用后端计算防篡改</text><text x="400" y="115" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#1E293B">外键约束防误删</text><text x="400" y="150" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#1E293B">删除前关联检查</text><text x="400" y="185" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#1E293B">JWT 防身份伪造</text><text x="400" y="220" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#1E293B">后端过滤用户数据</text>
    <rect x="760" y="0" width="350" height="250" rx="8" fill="#F0F4FF"/><text x="780" y="40" font-family="Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="bold" fill="#10B981">角色隔离</text><text x="780" y="80" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#1E293B">导航守卫 beforeEnter</text><text x="780" y="115" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#1E293B">患者不能访问员工页面</text><text x="780" y="150" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#1E293B">员工不能访问门户页面</text><text x="780" y="185" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#1E293B">医生菜单有限权限</text><text x="780" y="220" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#1E293B">路由白名单机制</text>
  </g>
</svg>
