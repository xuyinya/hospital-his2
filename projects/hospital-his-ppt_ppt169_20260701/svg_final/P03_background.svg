<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF" />
  
  <path fill="#2563EB" d="M83,44 H83 A3,3 0 0 1 86,47 V77 A3,3 0 0 1 83,80 H83 A3,3 0 0 1 80,77 V47 A3,3 0 0 1 83,44 Z" />
  <text x="100" y="72" font-family="Microsoft YaHei, Arial, sans-serif" font-size="42" font-weight="bold" fill="#1E293B">项目背景</text>
  <line x1="100" y1="92" x2="280" y2="92" stroke="#06B6D4" stroke-width="2" />
  
  <g transform="translate(100,140)">
    <text x="0" y="0" font-family="Microsoft YaHei, Arial, sans-serif" font-size="32" fill="#1E293B">医院门诊信息化是医疗改革的核心环节</text>
    <text x="0" y="48" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#64748B">传统纸质流程效率低下、数据孤岛严重</text>
    <text x="0" y="90" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#64748B">B/S架构的HIS系统可实现全流程数字化管理</text>
  </g>
  
  <g transform="translate(100,300)">
    <path fill="#F0F4FF" d="M8,0 H322 A8,8 0 0 1 330,8 V92 A8,8 0 0 1 322,100 H8 A8,8 0 0 1 0,92 V8 A8,8 0 0 1 8,0 Z" />
    <text x="20" y="36" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#64748B">系统模块</text>
    <text x="20" y="72" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold" fill="#2563EB">12 个</text>
  </g>
  <g transform="translate(480,300)">
    <path fill="#F0F4FF" d="M8,0 H322 A8,8 0 0 1 330,8 V92 A8,8 0 0 1 322,100 H8 A8,8 0 0 1 0,92 V8 A8,8 0 0 1 8,0 Z" />
    <text x="20" y="36" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#64748B">数据表</text>
    <text x="20" y="72" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold" fill="#06B6D4">13 张</text>
  </g>
  <g transform="translate(860,300)">
    <path fill="#F0F4FF" d="M8,0 H322 A8,8 0 0 1 330,8 V92 A8,8 0 0 1 322,100 H8 A8,8 0 0 1 0,92 V8 A8,8 0 0 1 8,0 Z" />
    <text x="20" y="36" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#64748B">API 接口</text>
    <text x="20" y="72" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold" fill="#2563EB">40+ 个</text>
  </g>
  
  <g transform="translate(100,460)">
    <text x="0" y="0" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#64748B">覆盖门诊全流程：挂号 → 就诊 → 病历 → 处方 → 检查检验 → 收费</text>
    <text x="0" y="40" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#64748B">三端分离：管理员端（后台管理） + 医生端（接诊工作台） + 患者端（自助门户）</text>
  </g>
  
  <circle cx="1150" cy="120" r="80" fill="#F0F4FF" />
  <circle cx="1150" cy="120" r="50" fill="none" stroke="#2563EB" stroke-width="1" opacity="0.2" />
</svg>