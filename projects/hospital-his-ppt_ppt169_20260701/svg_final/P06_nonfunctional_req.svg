<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF" />
  <path fill="#2563EB" d="M83,44 H83 A3,3 0 0 1 86,47 V77 A3,3 0 0 1 83,80 H83 A3,3 0 0 1 80,77 V47 A3,3 0 0 1 83,44 Z" />
  <text x="100" y="72" font-family="Microsoft YaHei, Arial, sans-serif" font-size="42" font-weight="bold" fill="#1E293B">非功能需求</text>
  <line x1="100" y1="92" x2="340" y2="92" stroke="#06B6D4" stroke-width="2" />
  
  <g transform="translate(80,140)">
    <path fill="#F0F4FF" d="M8,0 H532 A8,8 0 0 1 540,8 V102 A8,8 0 0 1 532,110 H8 A8,8 0 0 1 0,102 V8 A8,8 0 0 1 8,0 Z" />
    <text x="30" y="40" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#2563EB">数据安全</text>
    <text x="30" y="75" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#64748B">密码 BCrypt 加密 · JWT Token 认证 · 请求拦截验证</text>
    <text x="30" y="100" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#64748B">费用后端计算防篡改 · 角色导航守卫</text>
  </g>
  <g transform="translate(660,140)">
    <path fill="#F0F4FF" d="M8,0 H532 A8,8 0 0 1 540,8 V102 A8,8 0 0 1 532,110 H8 A8,8 0 0 1 0,102 V8 A8,8 0 0 1 8,0 Z" />
    <text x="30" y="40" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#06B6D4">数据一致性</text>
    <text x="30" y="75" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#64748B">@Transactional 事务注解保证原子性</text>
    <text x="30" y="100" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#64748B">外键约束 · 删除前关联记录检查</text>
  </g>
  <g transform="translate(80,280)">
    <path fill="#F0F4FF" d="M8,0 H532 A8,8 0 0 1 540,8 V102 A8,8 0 0 1 532,110 H8 A8,8 0 0 1 0,102 V8 A8,8 0 0 1 8,0 Z" />
    <text x="30" y="40" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#2563EB">可用性</text>
    <text x="30" y="75" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#64748B">统一 Result 返回格式 · ElMessage 错误提示</text>
    <text x="30" y="100" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#64748B">GlobalExceptionHandler 全局异常捕获</text>
  </g>
  <g transform="translate(660,280)">
    <path fill="#F0F4FF" d="M8,0 H532 A8,8 0 0 1 540,8 V102 A8,8 0 0 1 532,110 H8 A8,8 0 0 1 0,102 V8 A8,8 0 0 1 8,0 Z" />
    <text x="30" y="40" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#06B6D4">可维护性</text>
    <text x="30" y="75" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#64748B">分层架构 MVC · 统一命名规范 · 全量中文注释</text>
    <text x="30" y="100" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#64748B">Knife4j API 文档 · 30 单元测试 · GPL 3.0</text>
  </g>
  
  <text x="640" y="490" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="26" fill="#1E293B">系统设计要求：安全认证 + 事务一致 + 统一异常 + 分页标准 + 角色隔离</text>
  <text x="640" y="540" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#94A3B8">前后端均按 RESTful 规范设计，接口返回 {code, message, data} 统一封装</text>
</svg>