<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF" />
  <path fill="#2563EB" d="M83,44 H83 A3,3 0 0 1 86,47 V77 A3,3 0 0 1 83,80 H83 A3,3 0 0 1 80,77 V47 A3,3 0 0 1 83,44 Z" />
  <text x="100" y="72" font-family="Microsoft YaHei, Arial, sans-serif" font-size="42" font-weight="bold" fill="#1E293B">医生角色 — 接诊工作台</text>
  <line x1="100" y1="92" x2="420" y2="92" stroke="#06B6D4" stroke-width="2" />
  
  <g transform="translate(80,150)">
    <path fill="#2563EB" d="M6,0 H194 A6,6 0 0 1 200,6 V74 A6,6 0 0 1 194,80 H6 A6,6 0 0 1 0,74 V6 A6,6 0 0 1 6,0 Z" /><text x="100" y="48" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#FFFFFF">患者列表</text>
    <polygon points="210,25 230,40 210,55" fill="#64748B" />
    <path fill="#3B82F6" d="M246,0 H434 A6,6 0 0 1 440,6 V74 A6,6 0 0 1 434,80 H246 A6,6 0 0 1 240,74 V6 A6,6 0 0 1 246,0 Z" /><text x="340" y="48" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#FFFFFF">点击接诊</text>
    <polygon points="450,25 470,40 450,55" fill="#64748B" />
    <path fill="#06B6D4" d="M486,0 H674 A6,6 0 0 1 680,6 V74 A6,6 0 0 1 674,80 H486 A6,6 0 0 1 480,74 V6 A6,6 0 0 1 486,0 Z" /><text x="580" y="48" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#FFFFFF">填写病历</text>
    <polygon points="690,25 710,40 690,55" fill="#64748B" />
    <path fill="#10B981" d="M726,0 H914 A6,6 0 0 1 920,6 V74 A6,6 0 0 1 914,80 H726 A6,6 0 0 1 720,74 V6 A6,6 0 0 1 726,0 Z" /><text x="820" y="48" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#FFFFFF">开处方/完成</text>
  </g>
  
  <g transform="translate(80,290)">
    <path fill="#F0F4FF" d="M8,0 H342 A8,8 0 0 1 350,8 V192 A8,8 0 0 1 342,200 H8 A8,8 0 0 1 0,192 V8 A8,8 0 0 1 8,0 Z" />
    <text x="20" y="35" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#2563EB">接诊功能</text>
    <text x="20" y="70" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#1E293B">查看患者信息+自述症状</text>
    <text x="20" y="100" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#1E293B">填写病历（主诉/诊断/治疗）</text>
    <text x="20" y="130" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#1E293B">搜索药品 → 添加明细</text>
    <text x="20" y="160" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#1E293B">自动计算处方总金额</text>
    <text x="20" y="190" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#1E293B">完成诊疗 → 状态已诊</text>
  </g>
  <g transform="translate(460,290)">
    <path fill="#F0F4FF" d="M8,0 H342 A8,8 0 0 1 350,8 V192 A8,8 0 0 1 342,200 H8 A8,8 0 0 1 0,192 V8 A8,8 0 0 1 8,0 Z" />
    <text x="20" y="35" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#06B6D4">数据过滤</text>
    <text x="20" y="70" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#1E293B">JWT 自动识别医生身份</text>
    <text x="20" y="100" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#1E293B">只显示本人患者的挂号</text>
    <text x="20" y="130" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#1E293B">已诊 / 待诊 筛选</text>
    <text x="20" y="160" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#1E293B">已诊患者可查看记录</text>
  </g>
  <g transform="translate(840,290)">
    <path fill="#F0F4FF" d="M8,0 H342 A8,8 0 0 1 350,8 V192 A8,8 0 0 1 342,200 H8 A8,8 0 0 1 0,192 V8 A8,8 0 0 1 8,0 Z" />
    <text x="20" y="35" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#10B981">涉及接口</text>
    <text x="20" y="70" font-family="Consolas, monospace" font-size="18" fill="#64748B">GET registration/list</text>
    <text x="20" y="100" font-family="Consolas, monospace" font-size="18" fill="#64748B">POST medical-record</text>
    <text x="20" y="130" font-family="Consolas, monospace" font-size="18" fill="#64748B">POST prescription</text>
    <text x="20" y="160" font-family="Consolas, monospace" font-size="18" fill="#64748B">POST prescription/detail</text>
    <text x="20" y="190" font-family="Consolas, monospace" font-size="18" fill="#64748B">PUT registration/status</text>
  </g>
</svg>