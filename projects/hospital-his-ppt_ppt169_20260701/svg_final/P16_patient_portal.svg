  <path fill="#F0F4FF" d="M88,410 H1192 A8,8 0 0 1 1200,418 V552 A8,8 0 0 1 1192,560 H88 A8,8 0 0 1 80,552 V418 A8,8 0 0 1 88,410 Z" />
