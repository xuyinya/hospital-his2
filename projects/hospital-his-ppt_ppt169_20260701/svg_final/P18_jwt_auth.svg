<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF" />
  <path fill="#2563EB" d="M83,44 H83 A3,3 0 0 1 86,47 V77 A3,3 0 0 1 83,80 H83 A3,3 0 0 1 80,77 V47 A3,3 0 0 1 83,44 Z" />
  <text x="100" y="72" font-family="Microsoft YaHei, Arial, sans-serif" font-size="42" font-weight="bold" fill="#1E293B">JWT 认证机制</text>
  <line x1="100" y1="92" x2="300" y2="92" stroke="#06B6D4" stroke-width="2" />
  
  <g transform="translate(80,140)">
    <path fill="#2563EB" d="M6,0 H174 A6,6 0 0 1 180,6 V64 A6,6 0 0 1 174,70 H6 A6,6 0 0 1 0,64 V6 A6,6 0 0 1 6,0 Z" /><text x="90" y="44" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#FFFFFF">用户登录</text>
    <polygon points="190,20 210,35 190,50" fill="#64748B" />
    <path fill="#3B82F6" d="M226,0 H414 A6,6 0 0 1 420,6 V64 A6,6 0 0 1 414,70 H226 A6,6 0 0 1 220,64 V6 A6,6 0 0 1 226,0 Z" /><text x="320" y="44" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#FFFFFF">JwtUtil.generateToken</text>
    <polygon points="430,20 450,35 430,50" fill="#64748B" />
    <path fill="#06B6D4" d="M466,0 H634 A6,6 0 0 1 640,6 V64 A6,6 0 0 1 634,70 H466 A6,6 0 0 1 460,64 V6 A6,6 0 0 1 466,0 Z" /><text x="550" y="44" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#FFFFFF">返回 Token</text>
    <polygon points="650,20 670,35 650,50" fill="#64748B" />
    <path fill="#10B981" d="M686,0 H874 A6,6 0 0 1 880,6 V64 A6,6 0 0 1 874,70 H686 A6,6 0 0 1 680,64 V6 A6,6 0 0 1 686,0 Z" /><text x="780" y="44" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#FFFFFF">Axios 自动携带</text>
    <polygon points="890,20 910,35 890,50" fill="#64748B" />
    <path fill="#64748B" d="M926,0 H1114 A6,6 0 0 1 1120,6 V64 A6,6 0 0 1 1114,70 H926 A6,6 0 0 1 920,64 V6 A6,6 0 0 1 926,0 Z" /><text x="1020" y="44" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#FFFFFF">拦截器解析验证</text>
  </g>
  
  <path fill="#1E293B" d="M86,260 H794 A6,6 0 0 1 800,266 V474 A6,6 0 0 1 794,480 H86 A6,6 0 0 1 80,474 V266 A6,6 0 0 1 86,260 Z" />
  <text x="100" y="290" font-family="Consolas, monospace" font-size="17" fill="#E2E8F0">String token = Jwts.builder()</text>
  <text x="130" y="318" font-family="Consolas, monospace" font-size="17" fill="#C9A84C">.subject(String.valueOf(userId))     // 用户ID</text>
  <text x="130" y="346" font-family="Consolas, monospace" font-size="17" fill="#06B6D4">.claim("username", username)         // 用户名</text>
  <text x="130" y="374" font-family="Consolas, monospace" font-size="17" fill="#10B981">.claim("role", role)                 // admin/doctor/patient</text>
  <text x="130" y="402" font-family="Consolas, monospace" font-size="17" fill="#64748B">.claim("doctorId", doctorId)         // 医生ID(可选)</text>
  <text x="130" y="430" font-family="Consolas, monospace" font-size="17" fill="#E2E8F0">.expiration(new Date(now + 86400000))// 24小时过期</text>
  <text x="130" y="458" font-family="Consolas, monospace" font-size="17" fill="#E2E8F0">.signWith(signingKey).compact();</text>
  
  <g transform="translate(840,260)">
    <path fill="#F0F4FF" d="M8,0 H352 A8,8 0 0 1 360,8 V212 A8,8 0 0 1 352,220 H8 A8,8 0 0 1 0,212 V8 A8,8 0 0 1 8,0 Z" />
    <text x="20" y="35" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#2563EB">权限控制链</text>
    <text x="20" y="70" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#1E293B">登录 → JWT生成</text>
    <text x="20" y="102" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#1E293B">请求 → 拦截器验证</text>
    <text x="20" y="134" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#1E293B">Controller → 从Attribute取</text>
    <text x="20" y="166" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#1E293B">前端 → 导航守卫角色隔离</text>
    <text x="20" y="198" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#1E293B">医生列表 → selectByDeptId</text>
    <text x="20" y="225" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#64748B">只查 status=1 在职医生</text>
  </g>
  <text x="640" y="550" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#94A3B8">密钥：NeusoftHospitalHIS2026SecretKeyForJWTTokenGeneration · 过期：86400000ms</text>
</svg>