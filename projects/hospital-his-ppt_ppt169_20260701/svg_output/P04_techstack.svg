<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="80" y="44" width="6" height="36" rx="3" fill="#2563EB"/>
  <text x="100" y="72" font-family="Microsoft YaHei, Arial, sans-serif" font-size="42" font-weight="bold" fill="#1E293B">技术栈总览</text>
  <line x1="100" y1="92" x2="320" y2="92" stroke="#06B6D4" stroke-width="2"/>
  <!-- 前端 -->
  <rect x="80" y="130" width="540" height="240" rx="8" fill="#F0F4FF"/>
  <text x="110" y="175" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#2563EB">前端</text>
  <text x="110" y="220" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#1E293B">Vue 3.4.21</text><text x="380" y="220" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#64748B">Composition API + Pinia</text>
  <text x="110" y="260" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#1E293B">Element Plus 2.5.6</text><text x="380" y="260" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#64748B">UI 组件库</text>
  <text x="110" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#1E293B">Vite 5.x</text><text x="380" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#64748B">构建 + HMR</text>
  <text x="110" y="340" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#1E293B">Axios + Vue Router 4</text><text x="380" y="340" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#64748B">HTTP + 路由</text>
  <!-- 后端 -->
  <rect x="660" y="130" width="540" height="240" rx="8" fill="#F0F4FF"/>
  <text x="690" y="175" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#06B6D4">后端</text>
  <text x="690" y="220" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#1E293B">Spring Boot 3.2.5</text><text x="960" y="220" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#64748B">Java 21</text>
  <text x="690" y="260" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#1E293B">MyBatis 3.0.3</text><text x="960" y="260" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#64748B">注解 + XML</text>
  <text x="690" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#1E293B">MySQL 8.0 + Druid</text><text x="960" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#64748B">连接池</text>
  <text x="690" y="340" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#1E293B">Knife4j 4.4.0</text><text x="960" y="340" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#64748B">API 文档</text>
  <!-- 安全 -->
  <rect x="80" y="400" width="540" height="120" rx="8" fill="#F0F4FF"/>
  <text x="110" y="445" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#2563EB">认证与安全</text>
  <text x="110" y="490" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#1E293B">JWT (jjwt 0.12.5) + BCrypt + 拦截器 + 导航守卫</text>
  <!-- 测试 -->
  <rect x="660" y="400" width="540" height="120" rx="8" fill="#F0F4FF"/>
  <text x="690" y="445" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#06B6D4">测试与构建</text>
  <text x="690" y="490" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#1E293B">JUnit 5 + Mockito + Maven Surefire 3.5.3</text>
  <!-- 底部 -->
  <text x="640" y="620" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="23" fill="#94A3B8">前后端分离 · RESTful API · JWT 认证 · 分层架构 · @Transactional · 30 单元测试</text>
</svg>
