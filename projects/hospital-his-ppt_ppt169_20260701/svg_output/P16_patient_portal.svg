<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="80" y="44" width="6" height="36" rx="3" fill="#2563EB"/>
  <text x="100" y="72" font-family="Microsoft YaHei, Arial, sans-serif" font-size="42" font-weight="bold" fill="#1E293B">患者角色 — 门户功能</text>
  <line x1="100" y1="92" x2="380" y2="92" stroke="#06B6D4" stroke-width="2"/>
  <text x="100" y="130" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#64748B">患者凭身份证号+密码登录，查看个人就诊信息</text>
  <!-- 四大模块 -->
  <g transform="translate(80,180)">
    <rect x="0" y="0" width="260" height="180" rx="8" fill="#F0F4FF"/><text x="15" y="40" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#2563EB">首页</text><text x="15" y="80" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#1E293B">个人信息</text><text x="15" y="110" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#1E293B">就诊概况统计</text><text x="15" y="140" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#1E293B">快捷入口</text>
    <rect x="290" y="0" width="260" height="180" rx="8" fill="#F0F4FF"/><text x="305" y="40" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#06B6D4">自助挂号</text><text x="305" y="80" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#1E293B">5步向导流程</text><text x="305" y="110" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#1E293B">选科→医生→类型</text><text x="305" y="140" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#1E293B">症状描述→确认</text>
    <rect x="580" y="0" width="260" height="180" rx="8" fill="#F0F4FF"/><text x="595" y="40" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#10B981">我的挂号</text><text x="595" y="80" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#1E293B">挂号记录列表</text><text x="595" y="110" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#1E293B">状态(诊断中/已完成)</text><text x="595" y="140" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#1E293B">费用信息</text>
    <rect x="870" y="0" width="260" height="180" rx="8" fill="#F0F4FF"/><text x="885" y="40" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#EF4444">病历/处方</text><text x="885" y="80" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#1E293B">查看个人病历</text><text x="885" y="110" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#1E293B">处方及明细查询</text><text x="885" y="140" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#1E293B">药品用法用量</text>
  </g>
  <!-- JWT 说明 -->
  <rect x="80" y="410" width="1120" height="150" rx="8" fill="#F0F4FF"/>
  <text x="110" y="455" font-family="Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="bold" fill="#2563EB">JWT 身份识别</text>
  <text x="110" y="495" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#1E293B">患者登录 → JWT Token(role=patient, userId=patient.id) → 导航守卫限制只能访问 /patient-portal</text>
  <text x="110" y="530" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#1E293B">后端从 request Attribute 中提取 userId 过滤数据，患者只能查看自己的记录</text>
</svg>
