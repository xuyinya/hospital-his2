<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="80" y="44" width="6" height="36" rx="3" fill="#2563EB"/>
  <text x="100" y="72" font-family="Microsoft YaHei, Arial, sans-serif" font-size="42" font-weight="bold" fill="#1E293B">系统测试 — 精选用例</text>
  <line x1="100" y1="92" x2="380" y2="92" stroke="#06B6D4" stroke-width="2"/>
  <!-- 用例表 -->
  <g transform="translate(80,140)">
    <rect x="0" y="0" width="1120" height="40" rx="4" fill="#2563EB"/><text x="20" y="28" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">编号</text><text x="100" y="28" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">测试名称</text><text x="520" y="28" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">预期结果</text>
    <rect x="0" y="45" width="1120" height="40" rx="0" fill="#F0F4FF"/><text x="20" y="73" font-family="Consolas, monospace" font-size="17" fill="#2563EB">TC-001</text><text x="100" y="73" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#1E293B">生成令牌后解析回读，所有声明应一致</text><text x="520" y="73" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#10B981">四个字段回读值与输入完全一致</text>
    <rect x="0" y="90" width="1120" height="40" rx="0" fill="#FFFFFF"/><text x="20" y="118" font-family="Consolas, monospace" font-size="17" fill="#2563EB">TC-003</text><text x="100" y="118" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#1E293B">无效令牌应被拒绝（空字符串、乱码、签名错误）</text><text x="520" y="118" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#10B981">全部返回 false</text>
    <rect x="0" y="135" width="1120" height="40" rx="0" fill="#F0F4FF"/><text x="20" y="163" font-family="Consolas, monospace" font-size="17" fill="#2563EB">TC-012</text><text x="100" y="163" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#1E293B">患者分页查询返回正确 PageResult（total=5, rows=2）</text><text x="520" y="163" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#10B981">total=5, rows有2条, 姓名匹配</text>
    <rect x="0" y="180" width="1120" height="40" rx="0" fill="#FFFFFF"/><text x="20" y="208" font-family="Consolas, monospace" font-size="17" fill="#2563EB">TC-014</text><text x="100" y="208" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#1E293B">新增药品参数透传（阿莫西林, AMX001, 15.50, 1000）</text><text x="520" y="208" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#10B981">drugName/Code/Price/Stock全部匹配</text>
    <rect x="0" y="225" width="1120" height="40" rx="0" fill="#F0F4FF"/><text x="20" y="253" font-family="Consolas, monospace" font-size="17" fill="#2563EB">TC-025</text><text x="100" y="253" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#1E293B">挂号状态流转 — 待诊(0) → 已诊(1)</text><text x="520" y="253" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#10B981">Mapper.updateStatus(1L, 1) 被调用1次</text>
    <rect x="0" y="270" width="1120" height="40" rx="0" fill="#FFFFFF"/><text x="20" y="298" font-family="Consolas, monospace" font-size="17" fill="#2563EB">TC-026</text><text x="100" y="298" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#1E293B">挂号状态流转 — 待诊(0) → 已取消(2)</text><text x="520" y="298" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#10B981">Mapper.updateStatus(1L, 2) 被调用1次</text>
    <rect x="0" y="315" width="1120" height="40" rx="0" fill="#F0F4FF"/><text x="20" y="343" font-family="Consolas, monospace" font-size="17" fill="#2563EB">TC-028</text><text x="100" y="343" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#1E293B">挂号按医生+状态过滤分页查询（doctorId=2, status=0）</text><text x="520" y="343" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#10B981">total=1, 仅含符合过滤条件的记录</text>
  </g>
